services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: vacancy-bot:latest
    container_name: vacancy-bot
    restart: always
    env_file: .env
    environment:
      # Baza Docker ichida emas — host'ning loyiha root papkasida (./vacancy.db)
      - DB_PATH=/data/vacancy.db
    volumes:
      - .:/data
      - ./logs:/app/logs
    expose: [ "8080" ]
    ports: [ "127.0.0.1:8080:8080" ]
    networks: [ botnet ]

networks:
  botnet:
    external: true
    name: botnet