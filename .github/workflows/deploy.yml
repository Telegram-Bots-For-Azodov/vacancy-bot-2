name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch: {}   # qo'lda ham ishga tushirish mumkin

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Sintaksis tekshiruvi
        run: python -m compileall bot

  deploy:
    needs: build-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Kodni serverga ko'chirish
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "bot,requirements.txt,Dockerfile,docker-compose.yml,.dockerignore"
          target: "/opt/vacancy-bot"
          overwrite: true

      - name: Serverda deploy (Docker)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd /opt/vacancy-bot
            # .env serverda doimiy turadi (app sirlari GitHub'da emas). Faqat mavjudligini tekshiramiz.
            if [ ! -f .env ]; then
              echo "XATO: /opt/vacancy-bot/.env topilmadi. Avval serverda .env ni bir marta yarating." >&2
              exit 1
            fi
            # botnet tarmog'i mavjudligini ta'minlash (odatda telegram-bot-api stack yaratadi)
            docker network inspect botnet >/dev/null 2>&1 || docker network create botnet
            docker compose build --no-cache
            docker compose up -d --force-recreate
            docker image prune -f
